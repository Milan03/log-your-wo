<router-outlet></router-outlet>
@if (translator.languageLoading$ | async) {
  <div class="language-loading-overlay" role="status"
    aria-live="polite" aria-busy="true">
    <div class="language-loading-overlay__content">
      <span class="spinner-border text-primary" aria-hidden="true"></span>
      <strong>{{ translator.loadingLabel }}</strong>
    </div>
  </div>
}
