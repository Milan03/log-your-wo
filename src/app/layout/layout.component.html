<div class="wrapper">
    <!-- top navbar-->
    <app-header class="topnavbar-wrapper"></app-header>
    <!-- sidebar-->
    <app-sidebar class="aside-container"></app-sidebar>
    <!-- offsidebar-->
    <app-offsidebar class="offsidebar"></app-offsidebar>
    <!-- Main section-->
    <section class="section-container">
        <div *ngIf="showGuestNotice" class="guest-notice" role="status">
            <em class="icon-screen-desktop" aria-hidden="true"></em>
            <div class="guest-notice__copy">
                <strong>{{ 'layout.LocalModeTitle' | translate }}</strong>
                <span>{{ 'layout.LocalModeDescription' | translate }}</span>
            </div>
            <button class="btn btn-sm btn-primary" type="button" (click)="openAccount()">{{ 'global.SignInOrRegister' | translate }}</button>
            <button class="guest-notice__close" type="button" [attr.aria-label]="'layout.DismissLocal' | translate"
                (click)="dismissGuestNotice()">
                <em class="icon-close" aria-hidden="true"></em>
            </button>
        </div>
        <div *ngIf="showInstallNotice && !showGuestNotice" class="install-notice" role="status">
            <em class="icon-screen-smartphone" aria-hidden="true"></em>
            <div class="install-notice__copy">
                <strong>{{ 'layout.InstallTitle' | translate }}</strong>
                <span *ngIf="installDevice === 'android'">{{ 'layout.InstallAndroid' | translate }}</span>
                <span *ngIf="installDevice === 'ios'">{{ 'layout.InstallIos' | translate }}</span>
            </div>
            <button *ngIf="installDevice === 'android'" class="btn btn-sm btn-outline-primary" type="button"
                (click)="installApp()">{{ 'layout.Install' | translate }}</button>
            <button class="install-notice__close" type="button" [attr.aria-label]="'layout.DismissInstall' | translate"
                (click)="dismissInstallNotice()">
                <em class="icon-close" aria-hidden="true"></em>
            </button>
        </div>
        <!-- Page content-->
        <div class="content-wrapper">
            <router-outlet></router-outlet>
        </div>
    </section>
    <!-- Page footer-->
    <!-- <footer class="footer-container" app-footer></footer> -->
</div>
